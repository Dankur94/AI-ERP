<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="editor.css">
  <title>Viewer</title>
</head>
<body>
  <div class="titlebar" style="-webkit-app-region: drag;">
    <span class="titlebar-text">Viewer</span>
    <div class="titlebar-controls" style="-webkit-app-region: no-drag;">
      <button class="titlebar-btn" id="btn-clear-marks" title="Clear all marks">&#x2715;</button>
      <button class="titlebar-btn btn-quit" id="btn-quit" title="Quit All (Ctrl+Shift+Q)">&#x23FB;</button>
      <button class="titlebar-btn" id="btn-close" title="Close">&times;</button>
    </div>
  </div>
  <div class="toolbar">
    <button id="btn-sub-claude" class="toolbar-claude" title="Sub-Claude: Fragen zu Inhalten stellen">sub</button>
    <button id="btn-new-claude" class="toolbar-claude" title="Neues Claude Code Fenster (Ausgangsfenster)">+Claude</button>
  </div>
  <div id="editor-container">
    <div id="placeholder">Select a node from the tree</div>
    <div id="viewer-content" class="hidden">
      <div id="node-title"></div>
      <div id="node-content"></div>
    </div>
  </div>
  <div id="context-toast" class="toast hidden">Context &rarr; Clipboard</div>
  <script src="editor.js"></script>
</body>
</html>
